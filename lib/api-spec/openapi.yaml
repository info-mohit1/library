openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: BookVerse API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: books
    description: Book operations
  - name: borrows
    description: Borrow operations
  - name: users
    description: User operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /books:
    get:
      operationId: listBooks
      tags: [books]
      summary: List all books
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [Story, Tech, Science]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

  /books/featured:
    get:
      operationId: getFeaturedBooks
      tags: [books]
      summary: Get top featured books
      responses:
        "200":
          description: Featured books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"

  /books/stats:
    get:
      operationId: getBooksStats
      tags: [books]
      summary: Get library stats (totals per category, available counts)
      responses:
        "200":
          description: Library stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryStats"

  /books/{id}:
    get:
      operationId: getBook
      tags: [books]
      summary: Get a single book
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Not found

  /borrows:
    get:
      operationId: listMyBorrows
      tags: [borrows]
      summary: List current user's borrows
      security:
        - clerkAuth: []
      responses:
        "200":
          description: List of borrows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Borrow"
    post:
      operationId: borrowBook
      tags: [borrows]
      summary: Borrow a book
      security:
        - clerkAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BorrowBookBody"
      responses:
        "201":
          description: Borrow created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Borrow"
        "400":
          description: Bad request (e.g. no copies available)

  /borrows/{id}/return:
    post:
      operationId: returnBook
      tags: [borrows]
      summary: Return a borrowed book
      security:
        - clerkAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Book returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Borrow"
        "404":
          description: Not found

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security:
        - clerkAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

components:
  securitySchemes:
    clerkAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Book:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        author:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [Story, Tech, Science]
        available_quantity:
          type: integer
        image_url:
          type: string
        total_quantity:
          type: integer
        borrow_count:
          type: integer
      required:
        - id
        - title
        - author
        - description
        - category
        - available_quantity
        - total_quantity
        - image_url
        - borrow_count

    BookListResponse:
      type: object
      properties:
        books:
          type: array
          items:
            $ref: "#/components/schemas/Book"
        total:
          type: integer
      required:
        - books
        - total

    LibraryStats:
      type: object
      properties:
        total_books:
          type: integer
        total_available:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryStat"
        total_borrows:
          type: integer
      required:
        - total_books
        - total_available
        - categories
        - total_borrows

    CategoryStat:
      type: object
      properties:
        category:
          type: string
        count:
          type: integer
        available:
          type: integer
      required:
        - category
        - count
        - available

    Borrow:
      type: object
      properties:
        id:
          type: integer
        book_id:
          type: integer
        user_id:
          type: string
        borrowed_at:
          type: string
          format: date-time
        returned_at:
          type: string
          format: date-time
          nullable: true
        book:
          $ref: "#/components/schemas/Book"
      required:
        - id
        - book_id
        - user_id
        - borrowed_at
        - returned_at

    BorrowBookBody:
      type: object
      properties:
        book_id:
          type: integer
      required:
        - book_id

    UserProfile:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        image_url:
          type: string
          nullable: true
        borrow_count:
          type: integer
      required:
        - id
        - name
        - email
        - borrow_count
