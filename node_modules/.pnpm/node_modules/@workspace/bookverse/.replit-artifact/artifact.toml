kind = "web"
previewPath = "/"
title = "BookVerse"
version = "1.0.0"
id = "artifacts/bookverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25446

[services.development]
run = "pnpm --filter @workspace/bookverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bookverse", "run", "build" ]
publicDir = "artifacts/bookverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25446"
BASE_PATH = "/"
